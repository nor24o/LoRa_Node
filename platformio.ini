; ═══════════════════════════════════════════════════════════════════════════
;  platformio.ini  —  LoRa Custom Node
;
;  Usage:
;    pio run -e esp32_sx1262 -t upload    ← flash
;    pio run -e esp32_sx1262 -t upload --upload-port /dev/ttyUSB0
;    pio device monitor -b 115200          ← serial monitor
;    pio run -e esp32_sx1262 -t size       ← show flash/RAM usage
;
;  Only ONE env is built at a time. Select with -e <name>.
;  All envs share [common] settings.
; ═══════════════════════════════════════════════════════════════════════════

; ── Shared settings ─────────────────────────────────────────────────────
[common]
framework     = arduino
lib_deps      =
    jgromes/RadioLib @ ^6.6.0
build_flags   =
    -I include
    -DCORE_DEBUG_LEVEL=0
monitor_speed = 115200
monitor_filters = esp32_exception_decoder   ; only affects ESP32 monitors

; ── Build flags for debug vs release ───────────────────────────────────
[debug_flags]
build_flags   =
    ${common.build_flags}
    -DDEBUG_ENABLED=true
    -g
    -Og

[release_flags]
build_flags   =
    ${common.build_flags}
    -DDEBUG_ENABLED=false
    -O2


; ════════════════════════════════════════════════════════════════════════
;  ESP32  (38-pin DevKit)  +  SX1262
;  Most common combo. 520 kB RAM, 4 MB flash, dual-core 240 MHz.
; ════════════════════════════════════════════════════════════════════════
[env:esp32_sx1262]
platform      = espressif32
board         = esp32dev
framework     = ${common.framework}
lib_deps      = ${common.lib_deps}
monitor_speed = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}
upload_speed  = 921600
build_flags   =
    ${common.build_flags}
    -DARDUINO_ESP32_DEV

    -DRADIO_SX1262

; ── ESP32 release build (disable debug, enable optimisation) ────────────
[env:esp32_sx1262_release]
platform      = espressif32
board         = esp32dev
framework     = ${common.framework}
lib_deps      = ${common.lib_deps}
monitor_speed = ${common.monitor_speed}
upload_speed  = 921600
build_flags   =
    -I include
    -DARDUINO_ESP32_DEV

    -DRADIO_SX1262
    -DDEBUG_ENABLED=false
    -O2

; ════════════════════════════════════════════════════════════════════════
;  ESP32-S3  +  SX1262
;  USB-native, dual-core, 512 kB RAM.
; ════════════════════════════════════════════════════════════════════════
[env:esp32s3_sx1262]
platform      = espressif32
board         = esp32-s3-devkitc-1
framework     = ${common.framework}
lib_deps      = ${common.lib_deps}
monitor_speed = ${common.monitor_speed}
upload_speed  = 921600
build_flags   =
    ${common.build_flags}
    -DARDUINO_ESP32_DEV

    -DRADIO_SX1262

; ════════════════════════════════════════════════════════════════════════
;  ESP32  +  LLCC68
;  LLCC68 is pin-compatible with SX1262 but limited to SF7–SF10.
; ════════════════════════════════════════════════════════════════════════
[env:esp32_llcc68]
platform      = espressif32
board         = esp32dev
framework     = ${common.framework}
lib_deps      = ${common.lib_deps}
monitor_speed = ${common.monitor_speed}
upload_speed  = 921600
build_flags   =
    ${common.build_flags}
    -DARDUINO_ESP32_DEV

    -DRADIO_LLCC68
    ; Override SF in case node_config.h has SF > 10
    -DLORA_SF=9

; ════════════════════════════════════════════════════════════════════════
;  ESP8266  (NodeMCU v2 / Wemos D1 mini)  +  SX1262
;  80 kB RAM — DEBUG_ENABLED adds ~400 B; disable if tight.
; ════════════════════════════════════════════════════════════════════════
[env:esp8266_sx1262]
platform      = espressif8266
board         = nodemcuv2
framework     = ${common.framework}
lib_deps      = ${common.lib_deps}
monitor_speed = ${common.monitor_speed}
build_flags   =
    ${common.build_flags}
    -DESP8266
    -DRADIO_SX1262

; ── Wemos D1 mini variant ───────────────────────────────────────────────
[env:d1mini_sx1262]
platform      = espressif8266
board         = d1_mini
framework     = ${common.framework}
lib_deps      = ${common.lib_deps}
monitor_speed = ${common.monitor_speed}
build_flags   =
    ${common.build_flags}
    -DESP8266
    -DRADIO_SX1262

; ════════════════════════════════════════════════════════════════════════
;  Arduino Uno  +  SX1278  (SX127x)
;  Only 2 kB RAM. Disable DEBUG_ENABLED to save ~400 B.
;  Only pins 2 and 3 support external interrupts.
; ════════════════════════════════════════════════════════════════════════
[env:uno_sx1278]
platform      = atmelavr
board         = uno
framework     = ${common.framework}
lib_deps      = ${common.lib_deps}
monitor_speed = ${common.monitor_speed}
build_flags   =
    -I include
    -DARDUINO_AVR_UNO
    -DRADIO_SX1278
    -DDEBUG_ENABLED=false      ; <- enable only if you have RAM headroom
    -O2

; ════════════════════════════════════════════════════════════════════════
;  Arduino Nano  +  SX1278
; ════════════════════════════════════════════════════════════════════════
[env:nano_sx1278]
platform      = atmelavr
board         = nanoatmega328new
framework     = ${common.framework}
lib_deps      = ${common.lib_deps}
monitor_speed = ${common.monitor_speed}
build_flags   =
    -I include
    -DARDUINO_AVR_NANO
    -DRADIO_SX1278
    -DDEBUG_ENABLED=false
    -O2

; ════════════════════════════════════════════════════════════════════════
;  Arduino Mega 2560  +  SX1278
;  8 kB RAM — comfortable. Can enable DEBUG_ENABLED.
; ════════════════════════════════════════════════════════════════════════
[env:mega_sx1278]
platform      = atmelavr
board         = megaatmega2560
framework     = ${common.framework}
lib_deps      = ${common.lib_deps}
monitor_speed = ${common.monitor_speed}
build_flags   =
    ${common.build_flags}
    -DARDUINO_AVR_MEGA2560
    -DRADIO_SX1278
    -Wl,-u,vfprintf
    -lprintf_flt
    -lm

; ════════════════════════════════════════════════════════════════════════
;  STM32 Nucleo-F401RE  +  SX1262
;  96 kB RAM, 512 kB flash, 84 MHz Cortex-M4.
; ════════════════════════════════════════════════════════════════════════
[env:nucleo_f401_sx1262]
platform      = ststm32
board         = nucleo_f401re
framework     = ${common.framework}
lib_deps      = ${common.lib_deps}
monitor_speed = ${common.monitor_speed}
build_flags   =
    ${common.build_flags}
    -DSTM32
    -DARDUINO_ARCH_STM32
    -DRADIO_SX1262

; ════════════════════════════════════════════════════════════════════════
;  STM32 Blue Pill (F103C8T6)  +  SX1262
;  20 kB RAM, 64 kB flash, 72 MHz Cortex-M3.
; ════════════════════════════════════════════════════════════════════════
[env:bluepill_sx1262]
platform      = ststm32
board         = bluepill_f103c8
framework     = ${common.framework}
lib_deps      = ${common.lib_deps}
monitor_speed = ${common.monitor_speed}
build_flags   =
    ${common.build_flags}
    -DSTM32
    -DARDUINO_ARCH_STM32
    -DRADIO_SX1262

; ════════════════════════════════════════════════════════════════════════
;  STM32 Black Pill (F411CE)  +  SX1262
;  128 kB RAM, 512 kB flash, 100 MHz Cortex-M4. Best STM32 option.
; ════════════════════════════════════════════════════════════════════════
[env:blackpill_f411_sx1262]
platform      = ststm32
board         = blackpill_f411ce
framework     = ${common.framework}
lib_deps      = ${common.lib_deps}
monitor_speed = ${common.monitor_speed}
build_flags   =
    ${common.build_flags}
    -DSTM32
    -DARDUINO_ARCH_STM32
    -DRADIO_SX1262
